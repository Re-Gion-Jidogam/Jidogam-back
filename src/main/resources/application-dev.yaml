spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        highlight_sql: true
        format_sql: true

logging:
  level:
    root: WARN
    region.jidogam: DEBUG
    org.springframework: INFO
    org.hibernate.sql: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        highlight_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: never

jwt:
  secret: 'this-is-jwt-secret-code-of-jidogam-porject-for-test'

logging:
  level:
    root: WARN
    region.jidogam: DEBUG
    org.springframework: INFO
    org.hibernate.sql: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO

jidogam:
  admin:
    email: test-admin@jidogam.com
    password: testpassword1234!
    nickname: test-admin
  storage:
    type: oci
    s3:
      access-key: test-dummy
      secret-key: test-dummy
      region: test-dummy
      bucket: test-dummy
    oci:
      namespace: test-dummy
      region: test-dummy
      access-key: test-dummy
      secret-key: test-dummy
      bucket: test-dummy

api:
  area:
    service-id: test-dummy
    secret-key: test-dummy
spring:
  application:
    name: jidogam
  profiles:
    active: dev
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        highlight_sql: false
        format_sql: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jidogam:
  storage:
    type: ${STORAGE_TYPE:local}
    local:
      root-path: ${STORAGE_LOCAL_ROOT_PATH:.jidogam/storage}
    s3:
      access-key: ${AWS_S3_ACCESS_KEY}
      secret-key: ${AWS_S3_SECRET_KEY}
      region: ${AWS_S3_REGION}
      bucket: ${AWS_S3_BUCKET}
      presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:600}
  stamp:
    cooldown:
      time: ${STAMP_COOLDOWN_TIME:5m}
  email:
    auth:
      expiration: ${EMAIL_AUTH_CODE_EXPIRATION:5m}
    password-reset:
      expiration: ${PASSWORD_RESET_TOKEN_EXPIRATION:15m}
      frontend-url: ${FRONTEND_URL:http://localhost:3000}
  exp:
    base-exp: 10
  area:
    weights:
      normal: 1.0
      interest: 1.5
      underserved: 2.0

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 15m
  refresh-token-expiration: 7d

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: WARN
    region.jidogam: INFO
    org.springframework: INFO
    org.hibernate.sql: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO

api:
  area:
    service-id: ${AREA_SERVICE_ID:dev-service-id}
    secret-key: ${AREA_SECRET_KEY:dev-secret-key}

cloud:
  aws:
    s3:
      bucket: ${S3_ACCESS_BUCKET_NAME}
      upload-expiration: 5m
    stack.auto: false
    region.static: ap-northeast-2
    credentials:
      access-key: ${S3_ACCESS_KEY_ID}
      secret-key: ${S3_SECRET_ACCESS_KEY}
services:
  app:
    container_name: jidogam-service
    image: yerimyeon/jidogam:latest
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - TZ=Asia/Seoul
      - JVM_OPTS=-Xmx512m -Xms256m -XX:MaxMetaspaceSize=256m
      - SPRING_PROFILES_ACTIVE=prod
    restart: always
    volumes:
      - ./logs:/var/log/jidogam
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s